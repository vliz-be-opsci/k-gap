# K-GAP stack with Virtuoso as the triple store
#
# Usage:
#   docker compose -f docker-compose.virtuoso.yml up -d
#
# OpenLink Virtuoso is a high-performance multi-model database with
# built-in SPARQL 1.1 support. In K-GAP, the "database per project"
# concept maps to a named graph URI (set via VIRTUOSO_GRAPH).
#
# SPARQL endpoint (after startup):
#   Query/Update: http://localhost:8890/sparql
#   Admin UI:     http://localhost:8890/conductor (DBA / password from DBA_PASSWORD)
#
# Official docs: https://hub.docker.com/r/redpencil/virtuoso
#
name: ${COMPOSE_PROJECT_NAME:-kgap}
# -----------------------------------------------------------------------
services:
  yasgui:
    image: redpencil/yasgui:latest
    container_name: test_kgap_yasgui
    environment:
      DEFAULT_SPARQL_ENDPOINT: "http://localhost:8890/sparql"
    ports:
      - "8080:80"

  virtuoso:
    build:
      context: ./virtuoso
    image: ${REG_NS:-kgap}/kgap_virtuoso:${BUILD_TAG:-latest}
    container_name: test_kgap_virtuoso
    env_file:
      - ./.env
    environment:
      # KGAP_REPO is used to construct the default named graph URI
      KGAP_REPO: ${KGAP_REPO:-kgap}
      # Override the named graph URI directly if needed:
      # VIRTUOSO_GRAPH: "http://example.org/my-graph"
      DBA_PASSWORD: ${VIRTUOSO_DBA_PASSWORD:-dba}
      # Allow the SPARQL endpoint to perform updates (INSERT/DELETE)
      VIRT_SPARQL_ResultSetMaxRows: "100000"
    ports:
      - "8890:8890"     # HTTP (SPARQL endpoint + Conductor UI)
      - "1111:1111"     # ISQL port (optional, for admin access)
    volumes:
      - ./data/virtuoso:/data
    # Virtuoso can take longer to start; adjust as needed:
    # healthcheck:
    #   start_period: 30s
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

  jupyter:
    build:
      context: ./jupyter
    image: ${REG_NS:-kgap}/kgap_jupyter:${BUILD_TAG:-latest}
    container_name: test_kgap_jupyter
    ports:
      - "8889:8888"
    links:
      - virtuoso
    volumes:
      - "./notebooks:/notebooks"
      - "./data:/data"
    env_file:
      - ./.env
    environment:
      GDB_BASE: "http://virtuoso:8890/"
      NOTEBOOK_ARGS: "--NotebookApp.token=''"
    depends_on:
      virtuoso:
        condition: service_healthy

  sembench:
    build:
      context: ./sembench
    image: ${REG_NS:-kgap}/kgap_sembench:${BUILD_TAG:-latest}
    container_name: test_kgap_sembench
    volumes:
      - "./data:/data"
    env_file:
      - ./.env
    depends_on:
      virtuoso:
        condition: service_healthy

  ldes-consumer:
    build:
      context: ./ldes-consumer
    image: ${REG_NS:-kgap}/kgap_ldes-consumer:${BUILD_TAG:-latest}
    container_name: test_kgap_ldes_consumer
    volumes:
      - "./data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    env_file:
      - ./.env
    environment:
      DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-kgap}_default
      DEFAULT_SPARQL_ENDPOINT: "http://virtuoso:8890/sparql"
    depends_on:
      virtuoso:
        condition: service_healthy
